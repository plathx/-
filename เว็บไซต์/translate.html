<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Universal Translator & OCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f8fafc;
        }
        .drag-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-7xl rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[95vh] lg:h-[90vh] border border-gray-100">
        
        <!-- Top Navigation / Header -->
        <div class="bg-slate-900 p-4 flex flex-col lg:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500 p-2 rounded-lg">
                    <i class="fa-solid fa-wand-magic-sparkles text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg leading-tight">AI OCR & Translator</h1>
                    <p id="modelStatus" class="text-slate-400 text-xs">Model: Gemini 2.0 Flash (Auto-switch)</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                <!-- API Key Input -->
                <div class="relative flex-1 lg:flex-none lg:w-64">
                    <input type="password" id="apiKeyInput" 
                        class="w-full bg-slate-800 text-slate-200 text-sm px-4 py-2 rounded-lg border border-slate-700 focus:outline-none focus:border-blue-500 transition-all" 
                        placeholder="ใส่ Gemini API Key ที่นี่...">
                    <i class="fa-solid fa-key absolute right-3 top-2.5 text-slate-500 text-xs"></i>
                </div>

                <!-- Language Selector -->
                <div class="flex items-center bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <span class="text-slate-400 px-3 text-xs font-medium uppercase tracking-wider">แปลเป็น:</span>
                    <select id="targetLanguage" class="bg-transparent text-white text-sm py-1.5 pr-8 focus:outline-none cursor-pointer">
                        <option value="Thai" selected>ภาษาไทย (Thai)</option>
                        <option value="English">อังกฤษ (English)</option>
                        <option value="Japanese">ญี่ปุ่น (Japanese)</option>
                        <option value="Chinese (Simplified)">จีน (Chinese)</option>
                        <option value="Korean">เกาหลี (Korean)</option>
                        <option value="French">ฝรั่งเศส (French)</option>
                        <option value="German">เยอรมัน (German)</option>
                        <option value="Spanish">สเปน (Spanish)</option>
                        <option value="Vietnamese">เวียดนาม (Vietnamese)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
            
            <!-- Left Side: Inputs -->
            <div class="w-full lg:w-1/2 flex flex-col p-6 bg-white border-r border-gray-100 overflow-y-auto">
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-camera"></i> 1. อัปโหลดรูปภาพ หรือ วางรูป (Ctrl+V)
                    </label>
                    <div id="dropZone" class="group h-64 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center relative transition-all hover:border-blue-400 hover:bg-blue-50/30 cursor-pointer overflow-hidden">
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                        
                        <div id="uploadPlaceholder" class="text-center transition-transform group-hover:scale-105">
                            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-100 transition-colors">
                                <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 group-hover:text-blue-500"></i>
                            </div>
                            <p class="text-slate-600 font-medium">คลิกเพื่อเลือกไฟล์ หรือ ลากวาง</p>
                            <p class="text-slate-400 text-xs mt-1 italic text-blue-500">แนะนำ: สามารถกด Paste รูปภาพได้ทันที</p>
                        </div>

                        <img id="imagePreview" class="absolute inset-0 w-full h-full object-contain hidden z-10 p-2" src="">
                        
                        <button id="clearImageBtn" class="absolute top-4 right-4 bg-white/90 backdrop-blur text-red-500 rounded-xl w-10 h-10 flex items-center justify-center shadow-lg border border-red-100 hover:bg-red-500 hover:text-white hidden z-20 transition-all">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col">
                    <label class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-keyboard"></i> 2. หรือใส่ข้อความที่ต้องการแปล
                    </label>
                    <textarea id="sourceText" class="w-full flex-1 min-h-[150px] p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-700 placeholder:text-slate-400" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
                </div>

                <button id="translateBtn" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-3 text-lg group">
                    <span>เริ่มวิเคราะห์และแปลผล</span>
                    <i class="fa-solid fa-chevron-right group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>

            <!-- Right Side: Outputs -->
            <div class="w-full lg:w-1/2 flex flex-col p-6 bg-slate-50/50 relative">
                
                <div id="loadingOverlay" class="absolute inset-0 bg-white/60 backdrop-blur-md z-30 hidden flex-col items-center justify-center p-8 text-center">
                    <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-blue-200 mb-6 animate-bounce">
                        <i class="fa-solid fa-brain text-white text-3xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">AI กำลังทำงาน...</h3>
                    <p id="loadingStatus" class="text-slate-500 max-w-xs">เรากำลังดึงข้อความจากภาพและแปลภาษาให้คุณ</p>
                    <div class="loader mt-6"></div>
                </div>

                <div class="flex flex-col h-full gap-6">
                    <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="bg-slate-50 px-5 py-3 border-b border-slate-100 flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                <i class="fa-solid fa-align-left text-blue-500"></i> ข้อความที่สกัดได้
                            </span>
                            <button class="copy-btn hover:text-blue-600 text-slate-400" data-target="extractedResult">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                        <textarea id="extractedResult" class="w-full flex-1 p-5 text-slate-600 text-sm focus:outline-none bg-transparent resize-none leading-relaxed" readonly placeholder="ข้อความจากภาพจะปรากฏที่นี่..."></textarea>
                    </div>

                    <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-md border-2 border-blue-50 overflow-hidden">
                        <div class="bg-blue-50 px-5 py-3 border-b border-blue-100 flex justify-between items-center">
                            <span class="text-xs font-bold text-blue-600 uppercase tracking-widest flex items-center gap-2">
                                <i class="fa-solid fa-language"></i> ผลการแปลภาษา
                            </span>
                            <button class="copy-btn hover:text-blue-800 text-blue-400" data-target="translatedResult">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                        <textarea id="translatedResult" class="w-full flex-1 p-5 text-slate-800 text-lg font-medium focus:outline-none bg-transparent resize-none leading-relaxed" readonly placeholder="คำแปลจะปรากฏที่นี่..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 opacity-0 transition-all duration-300 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-[100] scale-90 pointer-events-none">
        <i id="toastIcon" class="fa-solid fa-circle-check"></i>
        <span id="toastMsg" class="text-sm font-medium"></span>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) apiKeyInput.value = savedKey;

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value);
            showToast("บันทึก API Key แล้ว", "success");
        });

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const clearImageBtn = document.getElementById('clearImageBtn');
        const sourceText = document.getElementById('sourceText');
        const translateBtn = document.getElementById('translateBtn');
        const targetLanguage = document.getElementById('targetLanguage');
        const extractedResult = document.getElementById('extractedResult');
        const translatedResult = document.getElementById('translatedResult');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingStatus = document.getElementById('loadingStatus');
        const modelStatus = document.getElementById('modelStatus');

        let currentBase64 = null;
        let currentMime = null;

        function handleFiles(files) {
            if (!files.length) return;
            const file = files[0];
            if (!file.type.startsWith('image/')) {
                showToast("กรุณาใช้ไฟล์รูปภาพเท่านั้น", "error");
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
                clearImageBtn.classList.remove('hidden');
                currentBase64 = e.target.result.split(',')[1];
                currentMime = file.type;
            };
            reader.readAsDataURL(file);
        }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => handleFiles(e.target.files);
        dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-active');
        dropZone.ondrop = e => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            handleFiles(e.dataTransfer.files);
        };

        document.onpaste = e => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    handleFiles([item.getAsFile()]);
                }
            }
        };

        clearImageBtn.onclick = e => {
            e.stopPropagation();
            fileInput.value = '';
            imagePreview.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
            clearImageBtn.classList.add('hidden');
            currentBase64 = null;
        };

        // รายการโมเดลที่แนะนำให้ใช้กับ v1beta
        const MODEL_PRIORITY = [
            'gemini-2.0-flash',
            'gemini-1.5-flash',
            'gemini-2.0-flash-lite-preview-02-05'
        ];

        // ฟังก์ชันช่วยสำหรับการหน่วงเวลา (Delay)
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function fetchWithRetry(modelName, key, contents, systemPrompt, retries = 5) {
            let lastError = null;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: contents,
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                        })
                    });

                    // หากสำเร็จ หรือเป็นความผิดพลาดที่แก้ด้วยการ Retry ไม่ได้ (เช่น 404, 400) ให้ส่งค่าคืนไปเลย
                    if (response.ok || (response.status !== 429 && response.status < 500)) {
                        return response;
                    }

                    // หากเป็น 429 (Rate Limit) หรือ 5xx (Server Error) ให้ทำ Exponential Backoff
                    const waitTime = Math.pow(2, i) * 1000;
                    console.log(`Retrying in ${waitTime}ms... (Attempt ${i + 1}/${retries})`);
                    await delay(waitTime);
                } catch (err) {
                    lastError = err;
                    if (i === retries - 1) throw err;
                    await delay(Math.pow(2, i) * 1000);
                }
            }
            throw lastError || new Error("Failed after multiple retries");
        }

        async function runAI() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                showToast("กรุณาใส่ API Key ก่อน", "error");
                return;
            }
            if (!currentBase64 && !sourceText.value.trim()) {
                showToast("ใส่รูปหรือข้อความก่อน", "error");
                return;
            }

            loadingOverlay.classList.remove('hidden');
            let success = false;
            let finalErrorMessage = "ไม่สามารถติดต่อ AI ได้";
            
            try {
                const lang = targetLanguage.value;
                const systemPrompt = `You are a specialist in OCR and Translation. Extract text from the image (if provided) and combine it with the manual text input. Then translate the entire content into ${lang}. You MUST return ONLY a JSON object with keys "original" and "translated".`;

                const contents = [{
                    parts: [{ text: `Process and translate to ${lang}.` }]
                }];

                if (currentBase64) {
                    contents[0].parts.push({ inlineData: { mimeType: currentMime, data: currentBase64 } });
                }
                if (sourceText.value.trim()) {
                    contents[0].parts.push({ text: sourceText.value });
                }

                for (const model of MODEL_PRIORITY) {
                    loadingStatus.innerText = `กำลังเชื่อมต่อโมเดล: ${model}...`;
                    modelStatus.innerText = `Model: ${model}`;
                    
                    try {
                        const response = await fetchWithRetry(model, key, contents, systemPrompt);
                        const data = await response.json();

                        if (response.ok) {
                            const rawText = data.candidates[0].content.parts[0].text;
                            const cleanJson = rawText.replace(/```json|```/g, "").trim();
                            const res = JSON.parse(cleanJson);
                            
                            extractedResult.value = res.original || "ไม่พบข้อความ";
                            translatedResult.value = res.translated || "แปลไม่สำเร็จ";
                            showToast(`สำเร็จด้วยโมเดล ${model}`, "success");
                            success = true;
                            break;
                        } else {
                            // จัดการข้อผิดพลาดที่ระบุเจาะจง
                            if (response.status === 404) {
                                console.warn(`Model ${model} not found, trying next...`);
                                continue;
                            }
                            if (response.status === 403) {
                                finalErrorMessage = "API Key ไม่ถูกต้อง หรือไม่มีสิทธิ์เข้าถึงโมเดลนี้";
                                break;
                            }
                            if (response.status === 429) {
                                finalErrorMessage = "โควตาการใช้งานเต็มแล้ว กรุณารอสักครู่ (ประมาณ 1 นาที) แล้วลองใหม่";
                                continue;
                            }
                            finalErrorMessage = data.error?.message || "เกิดข้อผิดพลาดในการเรียก API";
                        }
                    } catch (e) {
                        console.error(`Error with model ${model}:`, e);
                        finalErrorMessage = "ไม่สามารถเชื่อมต่อเครือข่ายได้ กรุณาตรวจสอบอินเทอร์เน็ต";
                        continue;
                    }
                }

                if (!success) {
                    throw new Error(finalErrorMessage);
                }

            } catch (err) {
                showToast(err.message, "error");
                translatedResult.value = "ข้อผิดพลาด: " + err.message;
            } finally {
                loadingOverlay.classList.add('hidden');
                loadingStatus.innerText = "เรากำลังดึงข้อความจากภาพและแปลภาษาให้คุณ";
            }
        }

        translateBtn.onclick = runAI;

        function showToast(msg, type = "info") {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 opacity-100 transition-all duration-300 px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-[100] scale-100 ${type === 'error' ? 'bg-red-600' : 'bg-slate-900'}`;
            setTimeout(() => { toast.classList.add('opacity-0', 'scale-90'); }, 4000);
        }

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.onclick = () => {
                const target = document.getElementById(btn.dataset.target);
                if (!target.value) return;
                
                const temp = document.createElement('textarea');
                temp.value = target.value;
                document.body.appendChild(temp);
                temp.select();
                try {
                    document.execCommand('copy');
                    showToast("คัดลอกลงคลิปบอร์ดแล้ว", "success");
                } catch (e) {
                    showToast("ไม่สามารถคัดลอกได้", "error");
                }
                document.body.removeChild(temp);
            };
        });
    </script>
</body>
</html>
