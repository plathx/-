<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อัปโหลดและแชร์ไฟล์ | File Uploader</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dropzone-active {
            border-color: #0ea5e9;
            background-color: #f0f9ff;
        }
        
        /* Custom Scrollbar for small text areas */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        .toast-leave {
            animation: slideOut 0.3s ease-in forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-gray-800">

    <div class="glass-panel w-full max-w-lg rounded-2xl shadow-xl overflow-hidden transition-all duration-300">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-brand-600 to-brand-500 p-6 text-white text-center">
            <i class="fa-solid fa-cloud-arrow-up text-4xl mb-3 drop-shadow-md"></i>
            <h1 class="text-2xl font-bold tracking-wide">ฝากไฟล์ & แชร์ลิงก์</h1>
            <p class="text-brand-100 text-sm mt-1">อัปโหลดไฟล์ของคุณได้อย่างรวดเร็วและปลอดภัย</p>
        </div>

        <div class="p-6">
            <!-- Provider Selection -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">เลือกเซิร์ฟเวอร์ (API)</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer relative">
                        <input type="radio" name="provider" value="gofile" class="peer sr-only" checked>
                        <div class="rounded-lg border-2 border-gray-200 p-3 hover:bg-gray-50 transition-colors peer-checked:border-brand-500 peer-checked:bg-brand-50 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-server text-brand-600"></i>
                            <span class="font-medium text-gray-700">Gofile.io</span>
                        </div>
                        <div class="absolute top-2 right-2 text-brand-500 opacity-0 peer-checked:opacity-100 transition-opacity">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    </label>

                    <label class="cursor-pointer relative">
                        <input type="radio" name="provider" value="catbox" class="peer sr-only">
                        <div class="rounded-lg border-2 border-gray-200 p-3 hover:bg-gray-50 transition-colors peer-checked:border-brand-500 peer-checked:bg-brand-50 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cat text-brand-600"></i>
                            <span class="font-medium text-gray-700">Catbox.moe</span>
                        </div>
                        <div class="absolute top-2 right-2 text-brand-500 opacity-0 peer-checked:opacity-100 transition-opacity">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    </label>
                </div>
                <p class="text-xs text-gray-400 mt-2 italic">* หมายเหตุ: Catbox รองรับไฟล์สูงสุด 200MB ส่วน Gofile ไม่จำกัดขนาด</p>
            </div>

            <!-- Dropzone -->
            <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-brand-400 hover:bg-brand-50 transition-all duration-200 group">
                <input type="file" id="fileInput" class="hidden">
                <div id="dropzone-content">
                    <div class="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-folder-open text-2xl"></i>
                    </div>
                    <h3 class="text-lg font-medium text-gray-700 mb-1">คลิกเพื่อเลือกไฟล์</h3>
                    <p class="text-sm text-gray-500">หรือลากไฟล์มาวางที่นี่</p>
                </div>
                
                <!-- File Preview (Hidden by default) -->
                <div id="file-preview" class="hidden flex flex-col items-center justify-center">
                    <i class="fa-solid fa-file-lines text-4xl text-brand-500 mb-3"></i>
                    <p id="file-name" class="font-medium text-gray-800 break-all line-clamp-2 max-w-full">filename.ext</p>
                    <p id="file-size" class="text-xs text-gray-500 mt-1">0 MB</p>
                    <button id="btn-remove-file" class="mt-3 text-red-500 text-sm hover:text-red-700 hover:underline">
                        ยกเลิกการเลือก
                    </button>
                </div>
            </div>

            <!-- Upload Button -->
            <button id="btn-upload" disabled class="w-full mt-6 bg-gray-300 text-gray-500 font-medium py-3 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 shadow-sm disabled:cursor-not-allowed">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                อัปโหลดไฟล์
            </button>

            <!-- Progress Section (Hidden by default) -->
            <div id="progress-container" class="hidden mt-6">
                <div class="flex justify-between text-sm mb-1">
                    <span id="progress-status" class="font-medium text-brand-700">กำลังอัปโหลด...</span>
                    <span id="progress-percent" class="font-bold text-gray-700">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" class="bg-brand-500 h-2.5 rounded-full" style="width: 0%; transition: width 0.3s ease;"></div>
                </div>
            </div>

            <!-- Result Section (Hidden by default) -->
            <div id="result-container" class="hidden mt-6 bg-green-50 border border-green-200 rounded-xl p-4">
                <h3 class="text-green-800 font-medium flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-circle-check text-green-500"></i> อัปโหลดสำเร็จ!
                </h3>
                <div class="flex items-center gap-2 bg-white p-2 border border-gray-200 rounded-lg">
                    <input type="text" id="result-url" readonly class="w-full text-sm text-gray-600 bg-transparent outline-none px-2" value="https://example.com/file">
                    <button id="btn-copy" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex-shrink-0">
                        <i class="fa-regular fa-copy"></i> คัดลอก
                    </button>
                    <a id="btn-open" href="#" target="_blank" class="bg-brand-500 hover:bg-brand-600 text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex-shrink-0">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> เปิด
                    </a>
                </div>
            </div>
            
            <!-- Error Message (Hidden by default) -->
            <div id="error-container" class="hidden mt-4 text-red-600 text-sm bg-red-50 p-3 rounded-lg border border-red-200 flex items-start gap-2">
                <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
                <span id="error-message">เกิดข้อผิดพลาดบางอย่าง</span>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform translate-y-24 opacity-0 transition-all duration-300 z-50">
        <i class="fa-solid fa-check-circle text-green-400 text-lg"></i>
        <span id="toast-message">คัดลอกลิงก์เรียบร้อยแล้ว!</span>
    </div>

    <script>
        // DOM Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const dropzoneContent = document.getElementById('dropzone-content');
        const filePreview = document.getElementById('file-preview');
        const fileNameEl = document.getElementById('file-name');
        const fileSizeEl = document.getElementById('file-size');
        const btnRemoveFile = document.getElementById('btn-remove-file');
        const btnUpload = document.getElementById('btn-upload');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressStatus = document.getElementById('progress-status');
        const resultContainer = document.getElementById('result-container');
        const resultUrl = document.getElementById('result-url');
        const btnCopy = document.getElementById('btn-copy');
        const btnOpen = document.getElementById('btn-open');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        let currentFile = null;

        // --- Utility Functions ---

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorContainer.classList.remove('hidden');
        }

        function hideError() {
            errorContainer.classList.add('hidden');
        }

        function resetUI() {
            progressContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');
            hideError();
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
            btnUpload.disabled = !currentFile;
            
            if (currentFile) {
                btnUpload.classList.remove('bg-gray-300', 'text-gray-500');
                btnUpload.classList.add('bg-brand-600', 'hover:bg-brand-700', 'text-white', 'shadow-md');
            } else {
                btnUpload.classList.add('bg-gray-300', 'text-gray-500');
                btnUpload.classList.remove('bg-brand-600', 'hover:bg-brand-700', 'text-white', 'shadow-md');
            }
        }

        // --- File Selection Logic ---

        function handleFile(file) {
            if (!file) return;
            currentFile = file;
            
            // Update UI
            fileNameEl.textContent = file.name;
            fileSizeEl.textContent = formatBytes(file.size);
            
            dropzoneContent.classList.add('hidden');
            filePreview.classList.remove('hidden');
            
            resetUI();
        }

        function removeFile(e) {
            e.stopPropagation(); // Prevent triggering file input click
            currentFile = null;
            fileInput.value = '';
            
            dropzoneContent.classList.remove('hidden');
            filePreview.classList.add('hidden');
            
            resetUI();
        }

        // --- Event Listeners ---

        // Dropzone interactions
        dropzone.addEventListener('click', () => fileInput.click());
        
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dropzone-active');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dropzone-active');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dropzone-active');
            
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        btnRemoveFile.addEventListener('click', removeFile);

        // Copy button
        btnCopy.addEventListener('click', () => {
            resultUrl.select();
            document.execCommand('copy');
            // Alternative modern clipboard API
            // navigator.clipboard.writeText(resultUrl.value);
            showToast('คัดลอกลิงก์เรียบร้อยแล้ว!');
        });

        // --- Upload Logic ---

        btnUpload.addEventListener('click', async () => {
            if (!currentFile) return;

            const provider = document.querySelector('input[name="provider"]:checked').value;
            
            btnUpload.disabled = true;
            btnUpload.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังดำเนินการ...';
            btnUpload.classList.replace('bg-brand-600', 'bg-gray-400');
            
            progressContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            hideError();
            
            try {
                let url = '';
                
                if (provider === 'gofile') {
                    url = await uploadToGofile(currentFile);
                } else if (provider === 'catbox') {
                    url = await uploadToCatbox(currentFile);
                }

                resultUrl.value = url;
                btnOpen.href = url;
                progressContainer.classList.add('hidden');
                resultContainer.classList.remove('hidden');
                
                showToast('อัปโหลดเสร็จสมบูรณ์!');

            } catch (err) {
                console.error(err);
                progressContainer.classList.add('hidden');
                showError(err.message || 'เกิดข้อผิดพลาดในการอัปโหลด กรุณาลองใหม่อีกครั้ง');
            } finally {
                btnUpload.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> อัปโหลดไฟล์ใหม่';
                btnUpload.classList.replace('bg-gray-400', 'bg-brand-600');
                btnUpload.disabled = false;
            }
        });


        function updateProgress(percent, statusText = 'กำลังอัปโหลด...') {
            progressPercent.textContent = `${Math.round(percent)}%`;
            progressBar.style.width = `${percent}%`;
            progressStatus.textContent = statusText;
        }

        async function uploadToGofile(file) {
            updateProgress(0, 'กำลังเชื่อมต่อเซิร์ฟเวอร์ Gofile...');
            
            const serverRes = await fetch('https://api.gofile.io/servers');
            const serverData = await serverRes.json();
            
            if (serverData.status !== 'ok') {
                throw new Error('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ Gofile ได้ในขณะนี้');
            }
            
            const serverName = serverData.data.servers[0].name;
            updateProgress(5, `เชื่อมต่อเซิร์ฟเวอร์ ${serverName} แล้ว...`);

            const formData = new FormData();
            formData.append('file', file);

            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', `https://${serverName}.gofile.io/contents/upload`);
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = 5 + ((e.loaded / e.total) * 94);
                        updateProgress(percentComplete, 'กำลังอัปโหลดไฟล์...');
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.status === 'ok') {
                                updateProgress(100, 'อัปโหลดเสร็จสิ้น!');
                                resolve(response.data.downloadPage);
                            } else {
                                reject(new Error('Gofile API Error: ' + response.status));
                            }
                        } catch(e) {
                            reject(new Error('รูปแบบการตอบกลับจากเซิร์ฟเวอร์ไม่ถูกต้อง'));
                        }
                    } else {
                        reject(new Error(`Server error: ${xhr.status}`));
                    }
                };

                xhr.onerror = () => {
                    reject(new Error('เกิดข้อผิดพลาดด้านเครือข่าย หรือเซิร์ฟเวอร์ไม่ตอบสนอง'));
                };

                xhr.send(formData);
            });
        }

        async function uploadToCatbox(file) {
            updateProgress(0, 'กำลังเตรียมไฟล์สำหรับ Catbox...');

            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);

            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://catbox.moe/user/api.php');
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 99;
                        updateProgress(percentComplete, 'กำลังส่งข้อมูลไปยัง Catbox...');
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const response = xhr.responseText;
                        if(response.startsWith('http')) {
                            updateProgress(100, 'อัปโหลดเสร็จสิ้น!');
                            resolve(response);
                        } else {
                            reject(new Error('Catbox ตอบกลับด้วยรูปแบบที่ไม่ใช่ลิงก์: ' + response));
                        }
                    } else {
                        reject(new Error(`Catbox error: ${xhr.status}. (อาจเกิดจากการบล็อก CORS ของเบราว์เซอร์)`));
                    }
                };

                xhr.onerror = () => {
                    reject(new Error('ไม่สามารถเชื่อมต่อ Catbox ได้ (อาจเกิดจากการบล็อก CORS ของเบราว์เซอร์ โปรดลองใช้ Gofile แทน)'));
                };

                xhr.send(formData);
            });
        }
    </script>
</body>
</html>
