<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Universal Translator (Gemini 2.5)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .spinner {
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header & Language Selection -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900 flex items-center justify-center gap-3">
                <i data-lucide="languages" class="text-blue-600"></i>
                AI Universal Translator
            </h1>
            <p class="text-slate-500 mt-2">แปลภาษาและสกัดข้อความจากภาพด้วยพลัง Gemini 2.5</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 flex flex-col md:flex-row items-center justify-center gap-4 md:gap-8">
            <div class="w-full md:w-64 relative">
                <select id="sourceLang" class="w-full appearance-none bg-slate-100 border-none text-slate-700 py-3 px-4 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none font-medium text-center cursor-pointer transition-all hover:bg-slate-200">
                    <option value="auto">ตรวจจับภาษาอัตโนมัติ</option>
                    <option value="Thai">Thai (ไทย)</option>
                    <option value="English">English (อังกฤษ)</option>
                    <option value="Chinese">Chinese (จีน)</option>
                    <option value="Japanese">Japanese (ญี่ปุ่น)</option>
                    <option value="Korean">Korean (เกาหลี)</option>
                    <option value="French">French (ฝรั่งเศส)</option>
                    <option value="German">German (เยอรมัน)</option>
                </select>
            </div>

            <div class="flex items-center justify-center text-slate-400">
                <i data-lucide="arrow-right-left" class="w-6 h-6"></i>
            </div>

            <div class="w-full md:w-64 relative">
                <select id="targetLang" class="w-full appearance-none bg-blue-50 text-blue-700 border-none py-3 px-4 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none font-medium text-center cursor-pointer transition-all hover:bg-blue-100">
                    <option value="Thai">Thai (ไทย)</option>
                    <option value="English" selected>English (อังกฤษ)</option>
                    <option value="Chinese">Chinese (จีน)</option>
                    <option value="Japanese">Japanese (ญี่ปุ่น)</option>
                    <option value="Korean">Korean (เกาหลี)</option>
                    <option value="French">French (ฝรั่งเศส)</option>
                    <option value="German">German (เยอรมัน)</option>
                </select>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
            
            <!-- Input Area -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[500px]">
                <div id="dropZone" class="p-6 border-b border-slate-100 bg-slate-50/50 flex-1 flex flex-col items-center justify-center relative min-h-[250px]">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    
                    <div id="uploadPlaceholder" class="w-full h-full border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-500 cursor-pointer hover:bg-white hover:border-blue-400 transition-all group p-4 text-center">
                        <i data-lucide="image-plus" class="w-12 h-12 text-blue-500 mb-3 group-hover:scale-110 transition-transform"></i>
                        <p class="font-medium text-slate-700">คลิกเพื่ออัปโหลด หรือ วางรูปภาพ</p>
                        <p class="text-xs mt-1 text-slate-400 uppercase">JPG, PNG, WEBP</p>
                    </div>

                    <div id="imagePreviewContainer" class="hidden w-full relative rounded-xl overflow-hidden border border-slate-200 shadow-inner">
                        <img id="previewImg" src="" class="w-full object-contain max-h-[300px] bg-white">
                        <div class="absolute top-2 right-2 flex gap-2">
                            <button id="clearImgBtn" class="bg-red-500/90 text-white p-2 rounded-full hover:bg-red-600 transition-colors shadow-lg">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="p-4 flex flex-col bg-white">
                    <textarea id="inputText" placeholder="พิมพ์ข้อความที่นี่ หรือให้ AI สกัดข้อความจากรูปภาพด้านบน..." class="w-full resize-none border-none focus:ring-0 p-2 text-lg text-slate-700 placeholder:text-slate-400 min-h-[150px]"></textarea>
                    
                    <div class="mt-4 pt-4 border-t border-slate-100 flex justify-end items-center">
                        <button id="translateBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all transform active:scale-95 shadow-lg shadow-blue-200">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> เริ่มการแปลด้วย AI
                        </button>
                    </div>
                </div>
            </div>

            <!-- Output Area -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[500px]">
                <div class="bg-slate-50 border-b border-slate-100 p-4 flex justify-between items-center h-[72px]">
                    <h3 class="font-bold text-slate-700 flex items-center gap-2">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-500"></i>
                        ผลลัพธ์การแปล
                    </h3>
                    <div class="flex gap-2">
                        <button id="copyBtn" class="hidden text-slate-600 hover:text-blue-600 bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-sm flex items-center gap-2 shadow-sm transition-all hover:border-blue-200">
                            <i data-lucide="copy" class="w-4 h-4"></i> คัดลอก
                        </button>
                    </div>
                </div>

                <div id="outputArea" class="p-6 flex-1 bg-slate-50/30 overflow-y-auto relative">
                    <div id="placeholderText" class="h-full flex flex-col items-center justify-center text-slate-300 space-y-2">
                        <i data-lucide="languages" class="w-16 h-16 opacity-10"></i>
                        <p class="text-lg italic opacity-40">ผลการแปลจะปรากฏที่นี่...</p>
                    </div>
                    
                    <div id="loadingState" class="hidden h-full flex flex-col items-center justify-center text-slate-500 space-y-4">
                        <div class="spinner w-12 h-12 border-4 border-slate-200 rounded-full"></div>
                        <div class="text-center">
                            <p class="font-medium animate-pulse">Gemini กำลังอ่านและแปลผล...</p>
                            <p class="text-xs text-slate-400 mt-1">ขั้นตอนนี้อาจใช้เวลาสักครู่</p>
                        </div>
                    </div>

                    <div id="resultText" class="hidden text-xl leading-relaxed text-slate-800 whitespace-pre-wrap selection:bg-blue-100"></div>
                </div>
            </div>
        </div>

        <!-- Custom Notification Message -->
        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl transition-all opacity-0 pointer-events-none transform translate-y-4 z-50">
            ข้อความถูกคัดลอกแล้ว
        </div>
    </div>

    <script>
        // API Configuration (Key is provided by the environment)
        const apiKey = "";
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        
        let imgData = null;
        let imgMime = null;

        // Initialize Icons
        lucide.createIcons();

        // Utility: Show Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // Image Selection Logic
        const handleFile = (file) => {
            if (!file || !file.type.startsWith('image/')) return;
            
            if (file.size > 4 * 1024 * 1024) {
                showToast("รูปภาพใหญ่เกินไป (จำกัด 4MB)");
                return;
            }

            imgMime = file.type;
            const reader = new FileReader();
            reader.onload = (e) => {
                imgData = e.target.result.split(',')[1];
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('uploadPlaceholder').classList.add('hidden');
                document.getElementById('imagePreviewContainer').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const fileInput = document.getElementById('fileInput');

        uploadPlaceholder.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        // Drag and Drop
        uploadPlaceholder.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadPlaceholder.classList.add('border-blue-500', 'bg-blue-50');
        });
        uploadPlaceholder.addEventListener('dragleave', () => {
            uploadPlaceholder.classList.remove('border-blue-500', 'bg-blue-50');
        });
        uploadPlaceholder.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadPlaceholder.classList.remove('border-blue-500', 'bg-blue-50');
            handleFile(e.dataTransfer.files[0]);
        });

        // Paste Image
        window.addEventListener('paste', (e) => {
            const file = [...e.clipboardData.items].find(x => x.type.indexOf('image') !== -1)?.getAsFile();
            if (file) handleFile(file);
        });

        document.getElementById('clearImgBtn').onclick = () => {
            imgData = null;
            document.getElementById('uploadPlaceholder').classList.remove('hidden');
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            fileInput.value = '';
        };

        // API Call with Exponential Backoff
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                let response;
                try {
                    response = await fetch(url, options);
                } catch (err) {
                    // ปัญหา Network (ไม่ได้ต่อเน็ต ฯลฯ)
                    if (i === maxRetries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                    continue;
                }

                if (response.ok) {
                    return await response.json();
                }

                // หากเป็น Error ฝั่งเซิร์ฟเวอร์ (5xx) หรือ Rate Limit (429) ให้ลองใหม่
                if (response.status === 429 || response.status >= 500) {
                    if (i === maxRetries - 1) throw new Error(`API Error: ${response.status}`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                    continue;
                }

                // หากเป็น Error ฝั่ง Client (400, 401, 403, 404) ห้ามให้ Retry จะได้ไม่ค้างยาว
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `API Error: ${response.status}`);
            }
        }

        // Translation Core Logic
        document.getElementById('translateBtn').onclick = async () => {
            const text = document.getElementById('inputText').value.trim();
            const source = document.getElementById('sourceLang').value;
            const target = document.getElementById('targetLang').value;

            if (!text && !imgData) {
                showToast("กรุณาใส่ข้อความหรืออัปโหลดรูปภาพก่อนครับ");
                return;
            }

            toggleState(true);

            let promptText = `Task: Translate the following content into ${target}. 
If an image is provided, extract all legible text from it first. 
If both text and an image are provided, treat the text as context or instructions for the image translation.
Source Language Hint: ${source === 'auto' ? 'Detect automatically' : source}.

Output requirements:
1. Provide only the translated text.
2. Maintain the original formatting and tone.
3. If the content is in the target language already, refine it or explain it briefly.
4. DO NOT include any conversational filler (e.g., "Here is the translation...").`;

            if (text) {
                promptText += `\n\nUser Input Context: ${text}`;
            }

            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: promptText },
                        ...(imgData ? [{ inlineData: { mimeType: imgMime, data: imgData } }] : [])
                    ]
                }]
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;

            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const output = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (output) {
                    showOutput(output);
                } else {
                    throw new Error("ไม่สามารถประมวลผลคำตอบจาก AI ได้ (ข้อมูลสูญหาย)");
                }
            } catch (err) {
                let errorMsg = err.message;
                
                // แจ้งเตือนสาเหตุที่เจอบ่อยให้เข้าใจง่ายขึ้น
                if (errorMsg.includes("403") || errorMsg.includes("API_KEY_INVALID") || errorMsg.includes("API key not valid")) {
                    errorMsg = "ไม่พบ API Key หรือคีย์ไม่ถูกต้อง (หากคุณเปิดไฟล์นี้บนเครื่องตัวเอง ต้องเติม API Key ในโค้ดด้วยครับ)";
                }
                
                showToast("เกิดข้อผิดพลาด: " + errorMsg);
                resetUI();
            }
        };

        function toggleState(isLoading) {
            document.getElementById('placeholderText').classList.add('hidden');
            document.getElementById('loadingState').classList.toggle('hidden', !isLoading);
            document.getElementById('resultText').classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
            document.getElementById('translateBtn').disabled = isLoading;
        }

        function showOutput(text) {
            document.getElementById('loadingState').classList.add('hidden');
            const resEl = document.getElementById('resultText');
            resEl.textContent = text;
            resEl.classList.remove('hidden');
            document.getElementById('copyBtn').classList.remove('hidden');
            document.getElementById('translateBtn').disabled = false;
        }

        function resetUI() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('placeholderText').classList.remove('hidden');
            document.getElementById('translateBtn').disabled = false;
        }

        // Clipboard with Fallback
        document.getElementById('copyBtn').onclick = function() {
            const textToCopy = document.getElementById('resultText').textContent;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast("คัดลอกลงคลิปบอร์ดแล้ว!");
                
                const originalHTML = this.innerHTML;
                this.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> คัดลอกแล้ว`;
                this.classList.add('text-green-600', 'border-green-200');
                lucide.createIcons();
                
                setTimeout(() => {
                    this.innerHTML = originalHTML;
                    this.classList.remove('text-green-600', 'border-green-200');
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                showToast("ไม่สามารถคัดลอกได้");
            }
            
            document.body.removeChild(textArea);
        };
    </script>
</body>
</html>
